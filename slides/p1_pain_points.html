<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background: #FFFFFF; 
            position: relative;
            color: #475569;
            overflow: hidden;
        }
        .header {
            padding-top: 60px;
            padding-left: 80px;
        }
        .title {
            font-weight: 900;
            font-size: 64px;
            color: #0F172A;
            line-height: 1.1;
            margin-bottom: 10px;
        }
        .process-flow {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 100px;
            padding: 0 40px;
        }
        .process-step {
            background: #F1F5F9;
            padding: 20px;
            margin: 0 10px;
            border: 2px solid #0F172A;
            font-weight: 900;
            text-align: center;
            width: 200px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
            font-size: 24px;
        }
        .process-step.active {
            background: #10B981;
            color: white;
            z-index: 2;
            transform: scale(1.1);
            box-shadow: 10px 10px 0px #0F172A;
        }
        .warning-label {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #EF4444;
            color: white;
            padding: 5px 15px;
            font-size: 16px;
            white-space: nowrap;
            font-weight: 900;
        }
        .arrow {
            font-size: 24px;
            color: #0F172A;
        }
        .cards-container {
            display: flex;
            justify-content: space-between;
            padding: 100px 80px 0 80px;
        }
        .card {
            width: 30%;
            border: 4px solid #0F172A;
            padding: 30px;
            background: #FFFFFF;
            box-shadow: 12px 12px 0px #6366F1;
        }
        .card-title {
            font-weight: 900;
            font-size: 28px;
            color: #0F172A;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .card-title i {
            margin-right: 15px;
            color: #6366F1;
        }
        .card-text {
            font-size: 18px;
            line-height: 1.6;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1 class="title">換線頻繁的工廠，每次換線品質就歸零</h1>
        </div>

        <div class="process-flow">
            <div class="process-step">來料檢驗</div>
            <i class="fas fa-chevron-right arrow"></i>
            <div class="process-step">備料備件</div>
            <i class="fas fa-chevron-right arrow"></i>
            <div class="process-step active">
                <div class="warning-label">⚠ 異常發生於此</div>
                組裝作業
            </div>
            <i class="fas fa-chevron-right arrow"></i>
            <div class="process-step">抽檢發現</div>
            <i class="fas fa-chevron-right arrow"></i>
            <div class="process-step" style="background:#FEE2E2; color:#EF4444;">重工損失</div>
        </div>

        <div class="cards-container">
            <div class="card">
                <div class="card-title"><i class="fas fa-eye-slash"></i> 看不到</div>
                <p class="card-text">作業過程無數位紀錄，異常無跡可查，不知道哪個步驟、哪個時段出問題。</p>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-clock"></i> 發現太晚</div>
                <p class="card-text">批次全數完成後才抽檢，整批已需重工或報廢，損失已發生且無法挽回。</p>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-line"></i> 無法改善</div>
                <p class="card-text">缺乏數據支撐，相同錯誤反覆出現，管理者只能靠師傅經驗猜測。</p>
            </div>
        </div>
    </div>
</body>
</html>
